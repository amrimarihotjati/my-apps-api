name: Scrape Gold Prices

on:
  schedule:
    # 00:00, 01:00, 06:00, 07:00, 09:00 WIB (UTC+7)
    # Corresponding UTC: 17:00, 18:00, 23:00, 00:00, 02:00
    - cron: '0 0,2,17,18,23 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r harga-emas/scraper/requirements.txt
        
    - name: Run Scraper
      run: python harga-emas/scraper/scraper.py
      
    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add harga-emas/prices.json
        git commit -m "Update gold prices" || exit 0
        git push
